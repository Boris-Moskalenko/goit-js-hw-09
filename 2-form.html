<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Feedback Form</title>
  <script type="module" crossorigin src="/goit-js-hw-09/2-form.js"></script>
  <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-Drt94GoR.css">
</head>

<body>

  <form class="feedback-form" autocomplete="off">
    <label class="feedback-form-label">
      Email
      <input class="feedback-form-input" type="email" name="email" autofocus />
    </label>

    <label class="feedback-form-label">
      Message
      <textarea class="feedback-form-text" name="message" rows="8"></textarea>
    </label>

    <button class="feedback-form-button" type="submit">Submit</button>
  </form>

</body>

</html>
