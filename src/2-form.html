<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Feedback Form</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

  <form class="feedback-form" autocomplete="off">
    <label class="feedback-form-label">
      Email
      <input class="feedback-form-input" type="email" name="email" autofocus />
    </label>

    <label class="feedback-form-label">
      Message
      <textarea class="feedback-form-text" name="message" rows="8"></textarea>
    </label>

    <button class="feedback-form-button" type="submit">Submit</button>
  </form>

  <script type="module" src="./js/2-form.js"></script>
</body>

</html>
